<section id="contatos" class="contatos">
    <h2 class="contatos-titulo">Entre em contato</h2>

    <form class="formulario-contato" id="formulario" onsubmit="enviarWhats(event)">
        <div class="grupo-form">
           <input placeholder="Nome" class="campo-form" id="nome">
        </div>
        <div class="grupo-form">
           <textarea class="campo-form" placeholder="Digite a sua mensagem" rows="6" id="mensagem"></textarea>
        </div>

        <button type="submit" class="botao-form">Enviar Whatsapp

        </button>
    </form>

</section>

<script>
    function enviarWhats(event){
        event.preventDefault()


        const nome = document.getElementById('nome').value;
        const mensagem = document.getElementById('mensagem').value;
        const telefone = '5581999606204'

        const texto = `Olá! Me chamo ${nome}, ${mensagem}`
        const msgFormatada = encodeURIComponent (texto)

        const url= `https://wa.me/${telefone}?text=${msgFormatada}`
        
        console.log(url)

        window.open(url, '_blank')
    }


</script>

    
</body>
